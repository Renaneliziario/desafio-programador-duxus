<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Integrantes</title>
    <style>
        body { 
            font-family: sans-serif; 
            margin: 0; 
            background-color: #f4f4f9; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container { 
            width: 100%;
            max-width: 400px; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
        }
        h2 { color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; width: 100%; }
        button:hover { background-color: #218838; }
        #message { margin-top: 15px; padding: 10px; border-radius: 4px; display: none; }
        .success { background-color: #d4edda; color: #155724; display: block !important; }
        .error { background-color: #f8d7da; color: #721c24; display: block !important; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Novo Integrante</h2>
        <form id="integranteForm">
            <div class="form-group">
                <label>Nome:</label>
                <input type="text" id="nome" required>
            </div>
            <div class="form-group">
                <label>Função:</label>
                <input type="text" id="funcao" required>
            </div>
            <button type="submit">Cadastrar</button>
        </form>
        <div id="message"></div>
        <br>
        <a href="/telas/time">Ir para Montagem de Time</a>
    </div>

    <script>
        document.getElementById('integranteForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nome = document.getElementById('nome').value;
            const funcao = document.getElementById('funcao').value;
            const msgDiv = document.getElementById('message');

            try {
                const response = await fetch('/api/cadastro/integrante', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, funcao })
                });

                if (response.ok) {
                    msgDiv.textContent = 'Sucesso! Integrante cadastrado.';
                    msgDiv.className = 'success';
                    document.getElementById('integranteForm').reset();
                } else {
                    msgDiv.textContent = 'Erro ao cadastrar.';
                    msgDiv.className = 'error';
                }
            } catch (error) {
                msgDiv.textContent = 'Erro de conexão.';
                msgDiv.className = 'error';
            }
        });
    </script>
</body>
</html>
